name: Build arcana

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies (all platforms for cross-compile)
        run: |
          bun install
          bun install --os="*" --cpu="*"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: "Lento47/arcana"
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "arcana binaries" || true

      - name: Build arcana binaries
        env:
          OPENCODE_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '' }}
          OPENCODE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0' }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: "Lento47/arcana"
        run: bun run --cwd packages/engine script/build.ts --skip-embed-web-ui

      - name: Publish to npmjs.org
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/arcana/npm
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" >> .npmrc
          npm publish --access public

      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          cd packages/arcana/npm
          sed -i 's/"arcana-ai"/"@Lento47\/arcana-ai"/' package.json
          echo "//npm.pkg.github.com/:_authToken=$NODE_AUTH_TOKEN" >> .npmrc
          npm publish --registry https://npm.pkg.github.com --access public
