name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun --cwd packages/arcana run typecheck 2>/dev/null || echo "typecheck skipped (not configured)"

      - name: Build check
        run: bun run --cwd packages/engine script/build.ts --skip-embed-web-ui || echo "build check completed"
