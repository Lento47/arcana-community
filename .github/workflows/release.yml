name: Release

# Trigger: manual or "bump" comment on commit
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Bump version and tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Detect bump level from commit message or workflow input
          BUMP="${{ inputs.bump }}"
          if [ -z "$BUMP" ]; then
            MSG=$(git log -1 --format=%B)
            if echo "$MSG" | grep -qE '\[bump major\]|bump:major'; then
              BUMP="major"
            elif echo "$MSG" | grep -qE '\[bump minor\]|bump:minor'; then
              BUMP="minor"
            elif echo "$MSG" | grep -qE '\[bump\]|bump:patch|\[bump patch\]|\[release\]'; then
              BUMP="patch"
            else
              echo "No bump directive in commit message — skipping release"
              exit 0
            fi
          fi
          echo "Bump level: $BUMP"

          # Read current version from npm package
          VERSION=$(node -p "require('./packages/arcana/npm/package.json').version")
          echo "Current version: $VERSION"

          # Split and bump
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Update version in all files
          cd packages/arcana/npm
          npm version "$NEW_VERSION" --no-git-tag-version
          cd ../../..
          node -p "const p=require('./package.json');p.version='$NEW_VERSION';JSON.stringify(p,null,2)" > /tmp/pkg.json
          cat /tmp/pkg.json > package.json
          node -p "const p=require('./packages/arcana/package.json');p.version='$NEW_VERSION';JSON.stringify(p,null,2)" > /tmp/arcana-pkg.json
          cat /tmp/arcana-pkg.json > packages/arcana/package.json
          sed -i "s/const VERSION = \"[^\"]*\"/const VERSION = \"v$NEW_VERSION\"/" packages/arcana/npm/bin/arcana.js
          sed -i "s/const VERSION = \"[^\"]*\"/const VERSION = \"$NEW_VERSION\"/" packages/arcana/src/index.ts

          TAG="v$NEW_VERSION"

          git commit -am "release: bump to $TAG"
          git tag "$TAG"
          # Pull to avoid race with concurrent pushes, then push atomically
          git pull --rebase origin master || true
          git push origin master && git push origin "$TAG" || {
            echo "Failed to push to master — another release may be in progress"
            git push origin --delete "$TAG" 2>/dev/null || true
            git tag -d "$TAG"
            exit 1
          }
          echo "Tagged $TAG — build.yml will publish to npm after binaries are ready"
